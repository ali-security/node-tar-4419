name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Legacy tar v4/tap@14 coverage across supported old Node lines.
          - node-version: '8.17.0'
            os: ubuntu-latest
          - node-version: '10.x'
            os: ubuntu-latest
          - node-version: '12.x'
            os: ubuntu-latest
          - node-version: '14.x'
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test -- -t0 --reporter=spec
